# Daily scraper for CoquChemas
# - scrape.js: Runs daily (New Arrivals by date, incremental mode)
# - scrape-all.js: NOT scheduled (manual only, use: npm run scrape:all)
name: Scrape Products

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
       
      - name: Install dependencies
        run: npm ci
       
      - name: Install Playwright and system dependencies
        run: npx playwright install --with-deps chromium
       
      - name: Run scraper (incremental)
        run: npm run scrape:new
       
      - name: Sync products.json to web
        run: cp scraper/products.json web/src/data/products.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/products.json web/src/data/products.json
          git diff --staged --quiet || (git commit -m "Update products.json - scraped from gakits.com" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}